gui:
  nerdFontsVersion: "3"
  showFileIcons: true
  # language: "ja"
  sidePanelWidth: 0.25
  theme:
    inactiveBorderColor:
      - "#777777"
os:
  open: "code"
  editPreset: "vscode"
  editCommand: "nvim"
git:
  pagers:
    - colorArg: always
      pager: /home/linuxbrew/.linuxbrew/bin/delta --dark --paging=never -s
  branchLogCmd: git log --graph --color=always --date=format:'%Y-%m-%d %H:%M' --pretty=format:'%C(#a0a0a0 reverse)%h%Creset %C(cyan)%ad%Creset %C(#dd4814)%ae%Creset %C(yellow reverse)%d%Creset %n%C(white bold)%s%Creset%n' {{branchName}} --
  allBranchesLogCmds:
    - git log --graph --color=always --date=format:'%Y-%m-%d %H:%M' --pretty=format:'%C(#a0a0a0 reverse)%h%Creset %C(cyan)%ad%Creset %C(#dd4814)%ae%Creset %C(yellow reverse)%d%Creset %n%C(white bold)%s%Creset%n' --
  log:
    showWholeGraph: true
customCommands:
  - key: 'F'
    context: 'files'
    description: 'Show detailed file history (with renames)'
    command: 'git log --follow --patch --stat --find-renames {{.SelectedFile.Name}} | less'
    output: terminal
  - key: '<c-f>'
    context: 'files'
    description: 'Show file history commits only'
    command: 'git log --follow --pretty=format:"%C(yellow)%h%Creset %C(blue)%ad%Creset %C(green)%an%Creset %s" --date=short {{.SelectedFile.Name}} | less'
    output: terminal
